[PHP]
; === 安全与基本设置 ===
display_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
default_charset = "UTF-8"

; === 网络相关（你的代码需要这些） ===
allow_url_fopen = On
allow_url_include = Off

; === 超时设置 ===
max_execution_time = 30
default_socket_timeout = 15

; === 扩展加载 ===
; 如果 .so 文件名是 curl.so：
extension=curl

; 如果是自定义编译的扩展且不在标准路径，需要指定完整路径：
; extension=/app/app/ext/curl.so

; 如果还需要其他扩展：
; extension=openssl
; extension=mbstring

; === 时区 ===
date.timezone = Asia/Shanghai
